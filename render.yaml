services:
  # ── Backend API (Node/Express) ────────────────────────────────────────────
  - type: web
    name: geohealth-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false   # Set this in the Render dashboard
      - key: CLIENT_ORIGIN
        sync: false   # Set to your Render static site URL, e.g. https://geohealth-insights.onrender.com

  # ── Frontend (React Static Site) ─────────────────────────────────────────
  - type: web
    name: geohealth-insights
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_MAPBOX_TOKEN
        sync: false   # Set this in the Render dashboard
      - key: REACT_APP_API_URL
        sync: false   # Set to your geohealth-api URL, e.g. https://geohealth-api.onrender.com
